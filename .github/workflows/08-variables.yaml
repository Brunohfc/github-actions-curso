name: 08 - Using Variables
run-name: 08 - Using Variables

on:
    push:
    workflow_dispatch:

env:
  WORKFLOW_VAR: "I am a workflow env var"
  OVERWRITTEN: "I will be overwritten"

jobs:
    echo:
        runs-on: ubuntu-latest
        env:
          JOB_VAR: "I am a job env var"
          OVERWRITTEN: "I will also be overwritten at job level"
        steps:
          - name: "Print Env Variables"
            env:
              STEP_VAR: "I am a step"
              STEP_VAR2: "I am another step var"
            run: | 
              echo "Step env var: <retrieve the value of ${{env.STEP_VAR}} here"
              echo "Step env var 2: <retrieve the value of ${{env.STEP_VAR2}} here"
              echo "Job env var: <retrieve the value of ${{env.JOB_VAR}} here"
              echo "Job env var: <retrieve the value of ${{env.JOB_VAR}} here"
              echo "Workflow env var: <retrieve the value of ${{env.WORKFLOW_VAR}} here"
              echo "Overwritten: <retrieve the value of ${{env.OVERWRITTEN}} here"
            
          - name: "Overwrite Job Variable"
            env:
              OVERWRITTEN: "I am overwritten at step level"
            run: |
                echo "Step env var: ${{env.OVERWRITTEN}}""
                