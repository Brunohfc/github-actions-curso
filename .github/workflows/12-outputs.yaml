name: 12 - outputs.yaml

on:
    workflow_dispatch:
        inputs:
            build-status:
              type: choice
              options:  
                - success
                - failure
              default: success
jobs:
    build:
        runs-on: ubuntu-latest
        outputs:
            build-status: ${{ steps.build.outputs.status }}

        steps:
            - name: Check build status
              if: ${{inputs.build-status == 'failure'}}
              run: echo Build failed && exit 1

            - name: Print GITHUB_OUTPUT path
              run: echo $GITHUB_OUTPUT

            - name: Build
              id: build
              run: echo "status=${{inputs.build-status}}" >> $GITHUB_OUTPUT
    deploy:
        runs-on: ubuntu-latest
        needs: build
        steps:
            - name: Deploy
              if: ${{ needs.build.outputs.build-status == 'success' }}
              run: echo Build status is ${{ needs.build.outputs.build-status }}


