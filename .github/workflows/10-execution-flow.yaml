name: Controlling the execution flow
run-name: 10 - Controlling the execution flow

on:
    workflow_dispatch:
        inputs: 
            pass-unit-tests: 
                type: boolean
                description: "Simulate unit test results. Set to false to simulate failing tests."
                default: false

jobs:
    lint-build:
        runs-on: ubuntu-latest
        steps:
          - name: Linting and build
            run: echo "Linting the code and building the project"
        
    unit-tests:
        runs-on: ubuntu-latest
        steps:
          - name: Run unit tests
            run: echo "Running unit tests"
            
          - name: Failing tests
            if: ${{ inputs.pass-unit-tests == false }}
            run: |
              echo "Tests failed"
              exit 1
    
    deploy-nonprod:
        runs-on: ubuntu-latest
        needs: [lint-build, unit-tests]
        steps:
          - name: Deploy to non-prod
            run: echo "Deploying to non-production environment"

    e2e-tests:
        runs-on: ubuntu-latest
        needs: deploy-nonprod
        steps:
          - name: Run end-to-end tests
            if: ${{needs.deploy-nonprod.result == 'success'}}
            run: echo "Running end-to-end tests"

    load-tests:
        runs-on: ubuntu-latest
        if: ${{ needs.deploy-nonprod.result == 'success' }}
        needs: deploy-nonprod
        steps:
            - name: Run load tests
              run: echo "Running load tests"
    
    deploy-prod:
        runs-on: ubuntu-latest
        needs: [e2e-tests, load-tests]
        if: ${{ needs.e2e-tests.result == 'success' && needs.load-tests.result == 'success' }}
        steps:
          - name: Deploy to production
            run: echo "Deploying to production environment"